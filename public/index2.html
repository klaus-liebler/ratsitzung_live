<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Express + Lit Beispiel</title>
    <style>
      :root {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f4f7fb, #dfe9f3);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "lit": "/vendor/lit/index.js",
          "lit-html": "/vendor/lit-html/lit-html.js",
          "lit-html/is-server.js": "/vendor/lit-html/is-server.js",
          "@lit/reactive-element": "/vendor/@lit/reactive-element/reactive-element.js",
          "lit-element/lit-element.js": "/vendor/lit-element/lit-element.js"
        }
      }
    </script>
  </head>
  <body>
    <hello-lit></hello-lit>

    <script type="module">
      import { LitElement, css, html } from "lit";

      class HelloLit extends LitElement {
        static styles = css`
          :host {
            display: block;
          }

          .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            width: min(90vw, 420px);
          }

          h1 {
            margin: 0 0 12px;
            font-size: 1.4rem;
          }

          p {
            margin: 0;
            color: #333;
          }
        `;

        render() {
          return html`
            <section class="card">
              <h1>Lit läuft</h1>
              <p>Diese Seite wird von Express ausgeliefert und mit Lit gerendert.</p>
            </section>
          `;
        }
      }

      customElements.define("hello-lit", HelloLit);
    </script>
  </body>
</html>
